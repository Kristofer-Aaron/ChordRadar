openapi: 3.0.3
info:
  title: ChordRadar Node.js API
  version: 1.0.0
  description: >
    API documentation representing the current codebase.
    Includes /auth, /users, /api/chords, /api/notations, /api/tunings, and /api/grips.

servers:
  - url: http://localhost:3030
    description: Local dev server

tags:
  - name: Auth
    description: Authentication, sessions, email verification, and TOTP authentication
  - name: Users
    description: User management (admin) and self/admin user lookup
  - name: Chords
    description: Chord resources
  - name: Notations
    description: Notation resources
  - name: Tunings
    description: Tuning resources
  - name: Grips
    description: Grip resources

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: >
        Issues a JWT bearer token and persists it as an api_access token.
        Optional "remember-me" query extends token lifetime.
      parameters:
        - name: remember-me
          in: query
          required: false
          description: If "true", token lifetime is extended.
          schema:
            type: string
            enum: ["true", "false"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
            example:
              email_address: "user@example.com"
              password: "correct horse battery staple"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
              example:
                ok: true
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                renewed: false
        "400":
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Missing credentials"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid credentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/login/totp:
    post:
      tags: [Auth]
      summary: Login with email and TOTP token
      description: >
        Issues a JWT bearer token when TOTP is enabled for the user and the 6-digit code is valid.
        Optional "remember-me" query extends token lifetime.
      parameters:
        - name: remember-me
          in: query
          required: false
          description: If "true", token lifetime is extended.
          schema:
            type: string
            enum: ["true", "false"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginTotpRequest"
            example:
              email_address: "user@example.com"
              totp_token: "123456"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
              example:
                ok: true
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                renewed: true
        "400":
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Missing credentials"
        "401":
          description: Invalid credentials / TOTP disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalid:
                  value: { error: "Invalid credentials" }
                disabled:
                  value: { error: "TOTP login is disabled" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate current session token)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: "Logout successful"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Session not found or already logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionNotFound"
              example:
                error: "Session not found or already logged out"
                code: "SESSION_NOT_FOUND"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: >
        Creates a user, generates an email verification token, and emails a verification link.
        Response includes a user object (role defaults to "user", status "pending").
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
            example:
              user_name: "johnny"
              first_name: "John"
              last_name: "Doe"
              email_address: "user@example.com"
              password: "correct horse battery staple"
              preferences: { theme: "dark" }
      responses:
        "201":
          description: Registered successfully (verification required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"
              example:
                message: "User registered successfully. Please check your email to verify your account."
                user:
                  id: 100
                  user_name: "johnny"
                  first_name: "John"
                  last_name: "Doe"
                  email_address: "user@example.com"
                  role: "user"
                  status: "pending"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Email already exists (from ensureEmailUnique middleware)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email already exists"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verify email using token
      parameters:
        - name: token
          in: query
          required: true
          description: 64-character hex token
          schema:
            type: string
            minLength: 64
            maxLength: 64
            pattern: "^[0-9a-fA-F]{64}$"
      responses:
        "200":
          description: Email verified; returns an API token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
              example:
                message: "Email verified successfully"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              examples:
                invalid:
                  value: { message: "Invalid or expired token" }
                expired:
                  value: { message: "Token expired" }
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/totp/enroll:
    post:
      tags: [Auth]
      summary: Enroll current user into TOTP (start setup)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enrollment started; returns QR data URL and otpauth URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpEnrollResponse"
              example:
                ok: true
                qr: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."
                otpauth_url: "otpauth://totp/MyApp:user@example.com?secret=BASE32&issuer=MyApp"
                message: "Scan the QR code in your authenticator app and submit a code to confirm."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User not found"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/totp/qr-code:
    get:
      tags: [Auth]
      summary: Get QR code PNG for currently enrolled TOTP secret
      description: Returns a PNG image that encodes the otpauth URL.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: PNG QR image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found or TOTP authentication not enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                userNotFound:
                  value: { error: "User not found" }
                notEnrolled:
                  value: { error: "TOTP authentication not enrolled for this user" }
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/totp/confirm:
    post:
      tags: [Auth]
      summary: Confirm TOTP for current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpConfirmRequest"
            examples:
              tokenField:
                value: { token: "123456" }
              codeField:
                value: { code: "123456" }
      responses:
        "200":
          description: Two-factor enabled; returns backup codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpConfirmResponse"
              example:
                ok: true
                message: "Two-factor authentication enabled."
                backup_codes: ["A1B2C3D4", "E5F6G7H8"]
        "400":
          description: Missing enrollment secret or missing code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                noSecret:
                  value: { error: "No 2FA secret to confirm" }
                missingCode:
                  value: { error: "Missing TOTP token" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User not found"
        "422":
          description: Invalid TOTP token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid TOTP token"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/totp/disable:
    post:
      tags: [Auth]
      summary: Disable TOTP for current user
      description: >
        Disables TOTP authentication using one of:
        - password
        - totp_token (6 digits)
        - backup_code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpDisableRequest"
            examples:
              password:
                value: { password: "correct horse battery staple" }
              totp:
                value: { totp_token: "123456" }
              backup:
                value: { backup_code: "A1B2C3D4" }
      responses:
        "200":
          description: Disabled (or already disabled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkMessage"
              examples:
                disabled:
                  value: { ok: true, message: "TOTP authentication disabled." }
                alreadyDisabled:
                  value: { ok: true, message: "Two-factor authentication already disabled." }
        "400":
          description: No verification factor provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Provide password, a valid TOTP code, or a backup code to disable TOTP authentication method"
        "401":
          description: Invalid credentials for provided factor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Invalid credentials"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User not found"
        "500":
          $ref: "#/components/responses/InternalError"

  /users:
    get:
      tags: [Users]
      summary: List all users (admin only)
      description: >
        Returns all users from the database (raw rows). Admin access required.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of users (admin view; may include sensitive fields)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Users]
      summary: Create a user (admin only)
      description: >
        Creates a new user. Requires admin.
        The validation schema requires password_hash and password_changed_at.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
            example:
              user_name: "johnny"
              first_name: "John"
              last_name: "Doe"
              email_address: "user@example.com"
              password_hash: "$2b$10$................................................."
              password_changed_at: "2026-01-01T10:00:00.000Z"
              preferences:
                theme: "dark"
              role: "user"
              status: "pending"
              email_verified: false
      responses:
        "201":
          description: Created user (admin view; returned object includes submitted fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{selector}/{value}:
    get:
      tags: [Users]
      summary: Get user by selector (self or admin)
      description: >
        Selector must be "id" or "email".
        Returns a sanitized user object (does not include password_hash or 2FA secrets).
        Requires authentication and active token.
        Authorization allows self lookup or admin depending on middleware.
      security:
        - bearerAuth: []
      parameters:
        - name: selector
          in: path
          required: true
          schema:
            type: string
            enum: [id, email]
        - name: value
          in: path
          required: true
          schema:
            type: string
          description: >
            If selector=id, value must be digits. If selector=email, value must be a valid email.
      responses:
        "200":
          description: User (sanitized view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublicSafe"
              example:
                id: 100
                user_name: "johnny"
                first_name: "John"
                last_name: "Doe"
                email_address: "user@example.com"
                role: "user"
                status: "active"
                email_verified: true
                two_factor_enabled: false
        "400":
          description: Invalid selector or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidId:
                  value: { error: "Invalid user id" }
                invalidEmail:
                  value: { error: "Invalid email" }
                unsupported:
                  value: { error: "Unsupported selector: username" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                message: "User not found"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}:
    patch:
      tags: [Users]
      summary: Patch a user (admin only)
      description: >
        Updates a user using a restricted set of fields (no password changes here).
        Returns a sanitized user object and attempts to parse preferences JSON.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatchRequest"
            example:
              status: "suspended"
              email_verified: false
              preferences:
                theme: "light"
      responses:
        "200":
          description: Updated user (sanitized view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPatchedResponse"
              example:
                id: 100
                user_name: "johnny"
                first_name: "John"
                last_name: "Doe"
                email_address: "user@example.com"
                role: "user"
                status: "suspended"
                email_verified: false
                two_factor_enabled: false
                preferences:
                  theme: "light"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "User not found"
        "409":
          description: Conflict (e.g., email already exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "A user with this email already exists"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      description: Deletes the user and removes their tokens. Returns 204 No Content.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Deleted
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # ------------------------ API: CHORDS ------------------------
  /api/chords:
    get:
      tags: [Chords]
      summary: List chords
      description: >
        Returns all chords.

        Optional `fields` query parameter can be a JSON string that controls whether
        some fields are returned as display values instead of foreign key IDs.
        Example: {"notation":"value","tuning":"value","grip":"value"}.

        If fields request values:
          - returns notation, tuning, grip (strings)

        Otherwise:
          - returns notation_id, tuning_id, grip_id (integers)
      parameters:
        - name: fields
          in: query
          required: false
          description: >
            JSON string controlling returned field types.
            Supported keys: notation, tuning, grip.
            Use "value" to return human-readable values.
          schema:
            type: string
          example: '{"notation":"value","tuning":"value","grip":"value"}'
      responses:
        "200":
          description: Array of chords
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ChordWithValues"
                    - $ref: "#/components/schemas/ChordWithIds"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Chords]
      summary: Create a chord
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChordCreate"
      responses:
        "201":
          description: Created (returns foreign key IDs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChordCreated"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Duplicate chord
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/chords/user-chords:
    get:
      tags: [Chords]
      summary: List chords associated with the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of user chords (always returns values)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChordWithValues"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/chords/{id}:
    get:
      tags: [Chords]
      summary: Get chord by ID
      parameters:
        - $ref: "#/components/parameters/ChordId"
        - name: fields
          in: query
          required: false
          description: JSON string controlling returned field types (see GET /api/chords).
          schema:
            type: string
      responses:
        "200":
          description: A chord
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ChordWithValues"
                  - $ref: "#/components/schemas/ChordWithIds"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Chord not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Chords]
      summary: Update a chord (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChordPatch"
      responses:
        "200":
          description: Updated chord (returns values)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChordWithValues"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Chord not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "409":
          description: Duplicate chord would be created by the patch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Chords]
      summary: Delete a chord (admin deletes chord; user removes relation)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChordId"
      responses:
        "204":
          description: Deleted (no content)
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Chord not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/chords/{selector}/{selectorValue}/tuning/{tuningValue}:
    get:
      tags: [Chords]
      summary: Find chords by selector and tuning
      parameters:
        - name: selector
          in: path
          required: true
          schema:
            type: string
            enum: [notation, grip]
        - name: selectorValue
          in: path
          required: true
          schema:
            type: string
        - name: tuningValue
          in: path
          required: true
          schema:
            type: string
            maxLength: 8
            pattern: "^[a-z]+$"
      responses:
        "200":
          description: Array of matching chords (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChordWithValues"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  # ------------------------ API: NOTATIONS ------------------------
  /api/notations:
    get:
      tags: [Notations]
      summary: List notations
      responses:
        "200":
          description: Array of notations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notation" }
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Notations]
      summary: Create a notation (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotationCreate" }
      responses:
        "201":
          description: Created notation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notation" }
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate notation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "500":
