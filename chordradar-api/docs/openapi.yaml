components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: Positive integer user id
      schema:
        type: integer
        format: int32
        minimum: 1

    ChordId:
      name: id
      in: path
      required: true
      description: Positive integer chord id
      schema: { type: integer, format: int32, minimum: 1 }

    NotationId:
      name: id
      in: path
      required: true
      description: Positive integer notation id
      schema: { type: integer, format: int32, minimum: 1 }

    TuningId:
      name: id
      in: path
      required: true
      description: Positive integer tuning id
      schema: { type: integer, format: int32, minimum: 1 }

    GripId:
      name: id
      in: path
      required: true
      description: Positive integer grip id
      schema: { type: integer, format: int32, minimum: 1 }

  schemas:
    # ---------------- AUTH ----------------
    AuthLoginRequest:
      type: object
      additionalProperties: false
      required: [email_address, password]
      properties:
        email_address:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255

    AuthLoginTotpRequest:
      type: object
      additionalProperties: false
      required: [email_address, totp_token]
      properties:
        email_address:
          type: string
          format: email
          maxLength: 255
        totp_token:
          type: string
          pattern: "^[0-9]{6}$"
          description: 6-digit TOTP code

    AuthLoginResponse:
      type: object
      required: [ok, token, renewed]
      properties:
        ok:
          type: boolean
        token:
          type: string
          description: JWT bearer token
        renewed:
          type: boolean
          description: True if a previous api_access token existed

    AuthRegisterRequest:
      type: object
      additionalProperties: false
      required: [user_name, first_name, last_name, email_address, password, preferences]
      properties:
        user_name:
          type: string
          maxLength: 16
        first_name:
          type: string
          maxLength: 16
        last_name:
          type: string
          maxLength: 32
        email_address:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
        preferences:
          type: object
          description: JSON preferences object

    AuthRegisterResponse:
      type: object
      required: [message, user]
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserPublic"

    UserPublic:
      type: object
      required: [id, user_name, first_name, last_name, email_address, role, status]
      properties:
        id:
          type: integer
          format: int32
        user_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email_address:
          type: string
          format: email
        role:
          type: string
          example: user
        status:
          type: string
          example: pending

    AuthVerifyResponse:
      type: object
      required: [message, token]
      properties:
        message:
          type: string
        token:
          type: string
          description: JWT bearer token

    TotpEnrollResponse:
      type: object
      required: [ok, qr, otpauth_url, message]
      properties:
        ok:
          type: boolean
        qr:
          type: string
          description: Data URL for QR image (PNG)
        otpauth_url:
          type: string
        message:
          type: string

    TotpConfirmRequest:
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
          pattern: "^[0-9]{6}$"
        code:
          type: string
          pattern: "^[0-9]{6}$"
      minProperties: 1
      description: Provide either token or code (6-digit TOTP)

    TotpConfirmResponse:
      type: object
      required: [ok, message, backup_codes]
      properties:
        ok:
          type: boolean
        message:
          type: string
        backup_codes:
          type: array
          items:
            type: string

    TotpDisableRequest:
      type: object
      additionalProperties: false
      properties:
        password:
          type: string
          minLength: 8
          maxLength: 255
        totp_token:
          type: string
          pattern: "^[0-9]{6}$"
        backup_code:
          type: string
          minLength: 6
          maxLength: 64
      minProperties: 1
      description: Provide password, totp_token, or backup_code

    OkMessage:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    SessionNotFound:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string

    # ---------------- USERS ----------------

    UserRecord:
      type: object
      description: >
        Admin/raw user record. GET /users uses SELECT * FROM users, so this may include
        additional DB columns beyond those listed here (password_hash, 2FA secrets, etc.).
      properties:
        id: { type: integer, format: int32 }
        user_name: { type: string, maxLength: 16 }
        first_name: { type: string, maxLength: 16 }
        last_name: { type: string, maxLength: 32 }
        email_address: { type: string, format: email, maxLength: 255 }
        password_hash: { type: string, maxLength: 255, description: "Bcrypt hash" }
        password_changed_at: { type: string, format: date-time }
        account_created_at: { type: string, format: date-time }
        last_login_at: { type: string, format: date-time }
        preferences:
          oneOf:
            - type: object
            - type: string
          description: Stored as JSON text in DB; may be returned as string depending on query path.
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, pending, suspended]
        email_verified:
          type: boolean
        two_factor_enabled:
          type: boolean
        two_factor_method:
          type: string
          nullable: true
        two_factor_secret:
          type: string
          nullable: true
        two_factor_backup:
          type: string
          nullable: true
      required: [id, user_name, first_name, last_name, email_address]

    UserPublicSafe:
      type: object
      description: Sanitized user response (no password hash or 2FA secrets).
      required: [id, user_name, first_name, last_name, email_address, role, status, email_verified, two_factor_enabled]
      properties:
        id: { type: integer, format: int32 }
        user_name: { type: string, maxLength: 16 }
        first_name: { type: string, maxLength: 16 }
        last_name: { type: string, maxLength: 32 }
        email_address: { type: string, format: email, maxLength: 255 }
        role: { type: string, enum: [user, admin] }
        status: { type: string, enum: [active, pending, suspended] }
        email_verified: { type: boolean }
        two_factor_enabled: { type: boolean }

    UserCreateRequest:
      type: object
      additionalProperties: false
      required:
        - user_name
        - first_name
        - last_name
        - email_address
        - password_hash
        - password_changed_at
        - preferences
      properties:
        user_name: { type: string, maxLength: 16 }
        first_name: { type: string, maxLength: 16 }
        last_name: { type: string, maxLength: 32 }
        email_address: { type: string, format: email, maxLength: 255 }
        password_hash:
          type: string
          minLength: 50
          maxLength: 255
          description: >
            Password hash (bcrypt). Route uses hashPasswordIfPresent middleware, but validation expects password_hash.
        password_changed_at: { type: string, format: date-time }
        preferences: { type: object }
        role: { type: string, enum: [user, admin] }
        status: { type: string, enum: [active, pending, suspended] }
        email_verified: { type: boolean }
        account_created_at: { type: string, format: date-time }
        last_login_at: { type: string, format: date-time }

    UserPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        user_name: { type: string, maxLength: 16 }
        first_name: { type: string, maxLength: 16 }
        last_name: { type: string, maxLength: 32 }
        email_address: { type: string, format: email, maxLength: 255 }
        role: { type: string, enum: [user, admin] }
        status: { type: string, enum: [active, pending, suspended] }
        email_verified: { type: boolean }
        two_factor_enabled: { type: boolean }
        preferences: { type: object }

    UserPatchedResponse:
      allOf:
        - $ref: "#/components/schemas/UserPublicSafe"
        - type: object
          properties:
            preferences:
              oneOf:
                - type: object
                - type: string
              description: Controller attempts to parse JSON if preferences is a string.

    # ---------------- CHORDS ----------------
    ChordCreate:
      type: object
      additionalProperties: false
      required: [notation, tuning, grip]
      properties:
        notation:
          type: string
          maxLength: 16
        tuning:
          type: string
          maxLength: 8
        grip:
          type: string
          maxLength: 8

    ChordPatch:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        notation: { type: string, maxLength: 16 }
        tuning: { type: string, maxLength: 8 }
        grip: { type: string, maxLength: 8 }

    ChordWithValues:
      type: object
      required: [id, notation, tuning, grip]
      properties:
        id: { type: integer, format: int32 }
        notation: { type: string, maxLength: 16 }
        tuning: { type: string, maxLength: 8 }
        grip: { type: string, maxLength: 8 }

    ChordWithIds:
      type: object
      required: [id, notation_id, tuning_id, grip_id]
      properties:
        id: { type: integer, format: int32 }
        notation_id: { type: integer, format: int32 }
        tuning_id: { type: integer, format: int32 }
        grip_id: { type: integer, format: int32 }

    ChordCreated:
      type: object
      required: [id, notation_id, tuning_id, grip_id]
      properties:
        id: { type: integer, format: int32 }
        notation_id: { type: integer, format: int32 }
        tuning_id: { type: integer, format: int32 }
        grip_id: { type: integer, format: int32 }

    # -------------- NOTATIONS ---------------
    Notation:
      type: object
      required: [id, value]
      properties:
        id: { type: integer, format: int32 }
        value: { type: string, minLength: 1, maxLength: 16 }

    NotationCreate:
      type: object
      additionalProperties: false
      required: [value]
      properties:
        value: { type: string, minLength: 1, maxLength: 16 }

    # --------------- TUNINGS ----------------
    Tuning:
      type: object
      required: [id, value]
      properties:
        id: { type: integer, format: int32 }
        value:
          type: string
          minLength: 1
          maxLength: 8
          description: Stored/validated as lowercase

    TuningCreate:
      type: object
      additionalProperties: false
      required: [value]
      properties:
        value: { type: string, minLength: 1, maxLength: 8 }

    # ---------------- GRIPS -----------------
    Grip:
      type: object
      required: [id, strings]
      properties:
        id: { type: integer, format: int32 }
        strings: { type: string, minLength: 1, maxLength: 8 }

    GripCreate:
      type: object
      additionalProperties: false
      required: [strings]
      properties:
        strings: { type: string, minLength: 1, maxLength: 8 }

    # ------------- GENERIC ERRORS -----------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Message:
      type: object
      required: [message]
      properties:
        message:
          type: string

  responses:
    ValidationError:
      description: Request validation error
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/Error"
              - $ref: "#/components/schemas/Message"
          examples:
            example:
              value:
                message: "Invalid request"

    Unauthorized:
      description: Missing/invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Unauthorized"

    Forbidden:
      description: Authenticated but not permitted or account not eligible (e.g., email not verified/status inactive)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Forbidden"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Internal Server Error"